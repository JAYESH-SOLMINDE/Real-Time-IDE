cat > ~/code-current/render.yaml << 'EOF'
services:
  - type: web
    name: real-time-ide-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
EOF